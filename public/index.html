<!DOCTYPE html>
<html>
<head>
<title>Secure Login</title>
<style>
body{font-family:Arial;background:#0a1f44;color:white;text-align:center;padding-top:100px}
input,button{padding:12px;margin:10px;width:260px;border-radius:6px;border:none}
button{background:#1a3b8b;color:white}
</style>
</head>
<body>

<h1>Secure Investment Login</h1>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>

<script>
function signup(){
  let u = user.value;
  let p = pass.value;

  if(!u || !p){ alert("Fill all fields"); return; }

  localStorage.setItem(u, JSON.stringify({
    password:p,
    balance:10000,
    history:[]
  }));

  alert("Account created");
}

function login(){
  let u = user.value;
  let p = pass.value;
  let data = JSON.parse(localStorage.getItem(u));

  if(data && data.password === p){
    localStorage.setItem("currentUser", u);
    window.location = "dashboard.html";
  } else {
    alert("Invalid login");
  }
}
</script>

</body>
</html>
