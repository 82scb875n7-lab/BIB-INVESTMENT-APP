<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body{font-family:Arial;background:#f2f2f2;margin:0}
.top{background:#0a1f44;color:white;padding:15px}
.card{background:white;margin:20px;padding:20px;border-radius:10px}
button{padding:12px;width:100%;background:#0a1f44;color:white;border:none;border-radius:6px}
.history p{border-bottom:1px solid #eee;padding:8px}
</style>
</head>
<body>

<div class="top">
  Welcome, <span id="name"></span>
</div>

<div class="card">
  <h2>Balance: $<span id="bal"></span></h2>
  <button onclick="goWithdraw()">Withdraw</button>
</div>

<div class="card">
  <h3>Transaction History</h3>
  <div id="history"></div>
</div>

<script>
let user = localStorage.getItem("currentUser");
let data = JSON.parse(localStorage.getItem(user));

document.getElementById("name").innerText = user;
document.getElementById("bal").innerText = data.balance;

let box = document.getElementById("history");

if(data.history.length === 0){
  box.innerHTML = "<p>No transactions yet</p>";
} else {
  data.history.forEach(t=>{
    let p = document.createElement("p");
    p.innerText = t;
    box.appendChild(p);
  });
}

function goWithdraw(){
  window.location = "withdraw.html";
}
</script>

</body>
</html>
