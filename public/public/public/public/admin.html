<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body{font-family:Arial;text-align:center;padding-top:50px}
input,button{padding:12px;margin:10px;width:250px}
button{background:#0a1f44;color:white;border:none}
</style>
</head>
<body>

<h2>Admin Control Panel</h2>

<input id="user" placeholder="Username"><br>
<input id="amount" placeholder="Amount"><br>

<button onclick="add()">Add Balance</button>
<button onclick="remove()">Remove Balance</button>

<script>
function add(){
  let u = user.value;
  let amt = Number(amount.value);

  let data = JSON.parse(localStorage.getItem(u));

  if(!data){
    alert("User not found");
    return;
  }

  data.balance += amt;
  data.history.unshift("Admin added $" + amt);

  localStorage.setItem(u, JSON.stringify(data));

  alert("Balance added");
}

function remove(){
  let u = user.value;
  let amt = Number(amount.value);

  let data = JSON.parse(localStorage.getItem(u));

  if(!data){
    alert("User not found");
    return;
  }

  data.balance -= amt;
  data.history.unshift("Admin removed $" + amt);

  localStorage.setItem(u, JSON.stringify(data));

  alert("Balance removed");
}
</script>

</body>
</html>
