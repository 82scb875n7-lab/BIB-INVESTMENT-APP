<!DOCTYPE html>
<html>
<head>
<title>Withdraw</title>
<style>
body{font-family:Arial;background:#f2f2f2}
.card{background:white;margin:20px;padding:20px;border-radius:10px}
input,button{padding:12px;width:100%;margin-top:10px;border-radius:6px;border:1px solid #ccc}
button{background:#0a1f44;color:white;border:none}
</style>
</head>
<body>

<div class="card">
  <h2>Withdraw Funds</h2>

  <input id="amount" placeholder="Enter amount">
  <button onclick="submitWithdraw()">Submit Withdrawal</button>
</div>

<script>
let user = localStorage.getItem("currentUser");
let data = JSON.parse(localStorage.getItem(user));

function submitWithdraw(){
  let amt = amount.value;

  if(!amt){
    alert("Enter amount");
    return;
  }

  amt = Number(amt);

  if(amt > data.balance){
    alert("Insufficient balance");
    return;
  }

  data.balance -= amt;
  data.history.unshift("$" + amt + " Withdrawal");

  localStorage.setItem(user, JSON.stringify(data));

  alert("Withdrawal successful");

  window.location = "dashboard.html";
}
</script>

</body>
</html>
